name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Lint
        working-directory: server
        run: npm run lint

      - name: Run tests
        working-directory: server
        run: npm run test:coverage

  client:
    name: Client tests & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Lint
        working-directory: client
        run: npm run lint

      - name: Run unit tests (headless Chrome)
        working-directory: client
        run: npm run test:ci

      - name: Build
        working-directory: client
        run: npm run build

  api:
    name: API tests (Cypress)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            client/package-lock.json

      # The Cypress binary lives outside node_modules, so cache it separately
      # to avoid re-downloading it on every run.
      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('client/package-lock.json') }}

      - name: Install root dependencies (start-server-and-test)
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Install client dependencies (Cypress)
        working-directory: client
        run: npm ci

      # Boots the Express mock API, waits for it to answer, runs the cy.request()
      # specs against it, then tears the server down - all via the same
      # `npm run e2e:api` a developer runs locally.
      - name: Run API boundary tests
        run: npm run e2e:api

  format:
    name: Prettier format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check
